# 优化说明: 
# 1. 引入 DOMAIN-KEYWORD 替代了近 40 条包含 httpdns 的冗余规则，极大提升性能。
# 2. 保留了被原作者替换为全局正则的底层硬编码 IP，弥补网络层拦截的盲区。
# 3. 完美处理了 /31 和 /23 等网段的合并与重叠。
